apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-internal
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 39.0.8
      helm:
        releaseName: traefik-internal
        values: |
          additionalArguments:
          - --serversTransport.insecureSkipVerify=true
          - --api.dashboard=true
          - --api.insecure=false
          - --global.sendanonymoususage=false
          - --global.checknewversion=false
          - --entrypoints.web.http.redirections.entrypoint.to=websecure
          - --entrypoints.web.http.redirections.entrypoint.scheme=https
          - --entrypoints.web.http.redirections.entrypoint.permanent=true

          logs:
            general:
              level: DEBUG
            access:
              enabled: true

          deployment:
            enabled: true
            replicas: 1

          ingressRoute:
            dashboard:
              enabled: false  # or true with an internal-only host + TLS later

          nodeSelector:
            worker: "true"

          providers:
            kubernetesCRD:
              enabled: true
              ingressClass: traefik-internal
            kubernetesIngress:
              enabled: true
              ingressClass: traefik-internal
              publishedService:
                enabled: true    # populate Ingress status (helps Argo CD health)

          rbac:
            enabled: true

          service:
            type: LoadBalancer
            spec:
              loadBalancerIP: 172.16.51.66
