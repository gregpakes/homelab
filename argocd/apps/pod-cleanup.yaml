apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pod-cleanup
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: pod-cleanup

  source:
    repoURL: https://github.com/gregpakes/homelab
    targetRevision: main
    path: argocd/infrastructure/pod-cleanup
    directory:
      recurse: true

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
