app-template:
  configMode: overwrite

  controllers:
    main:
      containers:
        main:
          envFrom:
            - secretRef:
                name: openclaw-secrets
      initContainers:
        init-skills:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "2026.3.2"
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw/skills/flaresolverr
              cp /config/skill-flaresolverr.md /home/node/.openclaw/skills/flaresolverr/SKILL.md
              echo "[init-skills] shared skills initialised"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        init-agents:
          dependsOn:
            - init-config
            - init-skills
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "2026.3.2"
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw/workspace-main
              mkdir -p /home/node/.openclaw/workspace-coder
              mkdir -p /home/node/.openclaw/workspace-devops

              cp /config/soul-main.md   /home/node/.openclaw/workspace-main/SOUL.md
              cp /config/soul-coder.md  /home/node/.openclaw/workspace-coder/SOUL.md
              cp /config/soul-devops.md /home/node/.openclaw/workspace-devops/SOUL.md

              echo "[init-agents] workspaces initialised"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

  configMaps:
    config:
      data:
        soul-main.md: |
          ## main

          You are a personal assistant. You are helpful, concise, and friendly.
          You help with everyday tasks: scheduling, research, writing, answering
          questions, and summarising information. You proactively ask clarifying
          questions when a request is ambiguous.

        soul-coder.md: |
          ## coder

          You are an expert software engineer. You write clean, idiomatic,
          well-structured code. You always explain your implementation choices
          briefly. You prefer simple solutions over clever ones. You point out
          potential bugs, edge cases, and security issues. When given existing
          code, you read it carefully before suggesting changes.

        soul-devops.md: |
          ## devops

          You are a senior DevOps and platform engineer specialising in
          Kubernetes, GitOps, and infrastructure automation. You are familiar
          with ArgoCD, Helm, k3s, and cloud-native tooling. You give precise,
          actionable answers. You prefer GitOps-first solutions. When reviewing
          manifests or configs you check for resource limits, security contexts,
          and best practices.

        skill-flaresolverr.md: |
          ---
          name: flaresolverr
          description: Bypass Cloudflare and anti-bot protection when fetching web pages. Use when web_fetch or the browser tool fails due to Cloudflare challenges, CAPTCHA walls, or bot detection (403/503 errors, "Just a moment..." pages). Routes requests through FlareSolverr proxy at http://flaresolverr.servarr.svc.cluster.local:8191 to solve challenges and retrieve page content.
          metadata: {"openclaw": {"always": true}}
          ---

          # FlareSolverr

          FlareSolverr is a proxy server that solves Cloudflare and other anti-bot challenges, returning the page content and cookies once the challenge is solved.

          **Endpoint:** `http://flaresolverr.servarr.svc.cluster.local:8191`

          ## When to Use

          Use FlareSolverr when a URL returns:
          - Cloudflare "Just a moment..." challenge pages
          - HTTP 403 or 503 from Cloudflare
          - Bot detection / CAPTCHA blocks

          Normal `web_fetch` or `browser` calls should still be tried first. Fall back to FlareSolverr only when they fail due to anti-bot protection.

          ## Usage

          Send a POST request to `/v1`:

          ```bash
          curl -s -X POST http://flaresolverr.servarr.svc.cluster.local:8191/v1 \
            -H "Content-Type: application/json" \
            -d '{
              "cmd": "request.get",
              "url": "https://example.com",
              "maxTimeout": 60000
            }'
          ```

          ### Response

          ```json
          {
            "status": "ok",
            "solution": {
              "url": "https://example.com",
              "status": 200,
              "response": "<html>...</html>",
              "cookies": [],
              "userAgent": "..."
            }
          }
          ```

          Extract the page content from `solution.response`. Use `solution.cookies` and `solution.userAgent` if you need to make follow-up requests with the same session.

          ### Session-based requests (optional)

          For sites requiring persistent sessions across multiple requests:

          ```bash
          # Create a session
          curl -s -X POST http://flaresolverr.servarr.svc.cluster.local:8191/v1 \
            -H "Content-Type: application/json" \
            -d '{"cmd": "sessions.create", "session": "my-session"}'

          # Use the session
          curl -s -X POST http://flaresolverr.servarr.svc.cluster.local:8191/v1 \
            -H "Content-Type: application/json" \
            -d '{"cmd": "request.get", "url": "https://example.com", "session": "my-session", "maxTimeout": 60000}'

          # Destroy when done
          curl -s -X POST http://flaresolverr.servarr.svc.cluster.local:8191/v1 \
            -H "Content-Type: application/json" \
            -d '{"cmd": "sessions.destroy", "session": "my-session"}'
          ```

          ## Notes

          - `maxTimeout` is in milliseconds; 60000 (60s) is a safe default for most sites
          - FlareSolverr runs a real browser internally — responses may take 10–30 seconds
          - Only available within the cluster (`servarr` namespace)

        openclaw.json: |
          {
            "gateway": {
              "port": 18789,
              "mode": "local",
              "trustedProxies": ["172.16.51.66"],
              "controlUi": {
                "allowedOrigins": ["https://openclaw.gregpakes.co.uk"]
              }
            },
            "browser": {
              "enabled": true,
              "defaultProfile": "default",
              "profiles": {
                "default": {
                  "cdpUrl": "http://localhost:9222",
                  "color": "#4285F4"
                }
              }
            },
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://172.16.10.133:11434",
                  "apiKey": "ollama-local",
                  "api": "ollama",
                  "models": [{ "id": "qwen3.5:9b", "name": "Qwen 3.5 9B", "contextWindow": 131072 }]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": { "primary": "anthropic/claude-sonnet-4-6" },
                "userTimezone": "Europe/London",
                "timeoutSeconds": 600,
                "maxConcurrent": 1
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "workspace": "/home/node/.openclaw/workspace-main",
                  "identity": { "name": "Assistant", "emoji": "🤝" },
                  "model": { "primary": "ollama/qwen3.5:9b" }
                },
                {
                  "id": "coder",
                  "workspace": "/home/node/.openclaw/workspace-coder",
                  "identity": { "name": "Coder", "emoji": "💻" }
                },
                {
                  "id": "devops",
                  "workspace": "/home/node/.openclaw/workspace-devops",
                  "identity": { "name": "DevOps", "emoji": "⚙️" }
                }
              ]
            },
            "bindings": [
              { "agentId": "main",   "match": { "channel": "slack", "accountId": "main" } },
              { "agentId": "coder",  "match": { "channel": "slack", "accountId": "coder" } },
              { "agentId": "devops", "match": { "channel": "slack", "accountId": "devops" } }
            ],
            "session": {
              "scope": "per-sender",
              "store": "/home/node/.openclaw/sessions",
              "reset": { "mode": "idle", "idleMinutes": 60 }
            },
            "logging": {
              "level": "info",
              "consoleLevel": "info",
              "consoleStyle": "compact",
              "redactSensitive": "tools"
            },
            "tools": {
              "profile": "full",
              "web": { "search": { "enabled": false }, "fetch": { "enabled": true } }
            },
            "channels": {
              "slack": {
                "groupPolicy": "open",
                "accounts": {
                  "main": {
                    "botToken": "${SLACK_BOT_TOKEN_MAIN}",
                    "appToken": "${SLACK_APP_TOKEN_MAIN}"
                  },
                  "coder": {
                    "botToken": "${SLACK_BOT_TOKEN_CODER}",
                    "appToken": "${SLACK_APP_TOKEN_CODER}"
                  },
                  "devops": {
                    "botToken": "${SLACK_BOT_TOKEN_DEVOPS}",
                    "appToken": "${SLACK_APP_TOKEN_DEVOPS}"
                  }
                }
              }
            }
          }

  persistence:
    config:
      advancedMounts:
        main:
          init-skills:
            - path: /config
              readOnly: true
          init-agents:
            - path: /config
              readOnly: true

    data:
      advancedMounts:
        main:
          init-skills:
            - path: /home/node/.openclaw
          init-agents:
            - path: /home/node/.openclaw

    tmp:
      advancedMounts:
        main:
          init-skills:
            - path: /tmp
          init-agents:
            - path: /tmp

    shm:
      enabled: true
      type: emptyDir
      medium: Memory
      sizeLimit: 1Gi
      advancedMounts:
        main:
          chromium:
            - path: /dev/shm

  ingress:
    main:
      enabled: true
      className: traefik-internal
      hosts:
        - host: openclaw.gregpakes.co.uk
          paths:
            - path: /
              service:
                identifier: main
                port: http
