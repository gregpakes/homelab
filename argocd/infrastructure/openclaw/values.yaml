app-template:
  configMode: overwrite

  controllers:
    main:
      containers:
        main:
          envFrom:
            - secretRef:
                name: openclaw-secrets
      initContainers:
        init-skills:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "2026.3.2"
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw/skills/flaresolverr
              cp /config/skill-flaresolverr.md /home/node/.openclaw/skills/flaresolverr/SKILL.md

              # Remove any old github skills from the shared folder (isolation is via workspace)
              rm -rf /home/node/.openclaw/skills/github-main
              rm -rf /home/node/.openclaw/skills/github-coder
              rm -rf /home/node/.openclaw/skills/github-devops

              if [ ! -f /home/node/.openclaw/bin/gh ]; then
                mkdir -p /home/node/.openclaw/bin
                GH_VERSION=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
                curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" -o /tmp/gh.tar.gz
                tar -xf /tmp/gh.tar.gz -C /tmp
                cp /tmp/gh_${GH_VERSION}_linux_amd64/bin/gh /home/node/.openclaw/bin/gh
                chmod +x /home/node/.openclaw/bin/gh
                echo "[init-skills] gh CLI installed: v${GH_VERSION}"
              else
                echo "[init-skills] gh CLI already installed: $(/home/node/.openclaw/bin/gh --version | head -1)"
              fi

              echo "[init-skills] shared skills initialised"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        init-freerouter:
          dependsOn:
            - init-config
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "2026.3.2"
          envFrom:
            - secretRef:
                name: openclaw-secrets
          command:
            - sh
            - -c
            - |
              if [ ! -d /home/node/.openclaw/plugins/freerouter ]; then
                openclaw plugins install openclaw-freerouter
                echo "[init-freerouter] freerouter plugin installed"
              else
                echo "[init-freerouter] freerouter plugin already installed, skipping"
              fi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        init-agents:
          dependsOn:
            - init-config
            - init-skills
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "2026.3.2"
          command:
            - sh
            - -c
            - |
              cp /config/agents.md        /home/node/.openclaw/workspace-main/AGENTS.md
              cp /config/coder-agents.md  /home/node/.openclaw/workspace-coder/AGENTS.md
              cp /config/agents.md        /home/node/.openclaw/workspace-devops/AGENTS.md

              mkdir -p /home/node/.openclaw/workspace-main/skills/github-main
              mkdir -p /home/node/.openclaw/workspace-coder/skills/github-coder
              mkdir -p /home/node/.openclaw/workspace-devops/skills/github-devops

              cp /config/soul-main.md   /home/node/.openclaw/workspace-main/SOUL.md
              cp /config/soul-coder.md  /home/node/.openclaw/workspace-coder/SOUL.md
              cp /config/soul-devops.md /home/node/.openclaw/workspace-devops/SOUL.md

              cp /config/skill-github-main.md   /home/node/.openclaw/workspace-main/skills/github-main/SKILL.md
              cp /config/skill-github-coder.md  /home/node/.openclaw/workspace-coder/skills/github-coder/SKILL.md
              cp /config/skill-github-devops.md /home/node/.openclaw/workspace-devops/skills/github-devops/SKILL.md

              echo "[init-agents] workspaces initialised"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

  configMaps:
    config:
      data:
        skill-github-main.md: |
          ---
          name: github-main
          description: "GitHub operations via `gh` CLI as the Assistant bot identity. Use for general GitHub queries: issues, PRs, CI status, repo info."
          ---
          # GitHub (Assistant)

          Use the `gh` CLI to interact with GitHub. The `GH_TOKEN` is pre-configured with the Assistant bot identity.

          ## Common Commands
          ```bash
          gh issue list --repo owner/repo
          gh pr list --repo owner/repo
          gh run list --repo owner/repo --limit 10
          gh pr view <number> --repo owner/repo
          gh issue create --title "..." --body "..." --repo owner/repo
          ```
          Always specify `--repo owner/repo`. Use `--json` with `--jq` for structured output.

        skill-github-coder.md: |
          ---
          name: github-coder
          description: "GitHub operations via `gh` CLI as the Coder bot identity. Use for code review, PRs, CI, issues. Identity: greg-coder-bot."
          ---
          # GitHub (Coder)

          Use the `gh` CLI to interact with GitHub. The `GH_TOKEN` is pre-configured with the Coder bot identity.

          ## Common Commands
          ```bash
          gh pr list --repo owner/repo
          gh pr create --title "..." --body "..."
          gh pr merge <number> --squash --repo owner/repo
          gh pr checks <number> --repo owner/repo
          gh run view <run-id> --repo owner/repo --log-failed
          gh issue list --repo owner/repo --state open
          ```
          Always specify `--repo owner/repo`. Use `--json` with `--jq` for structured output.

        skill-github-devops.md: |
          ---
          name: github-devops
          description: "GitHub operations via `gh` CLI as the DevOps bot identity. Use for CI/CD, releases, workflow runs, repo admin. Identity: greg-devops-bot."
          ---
          # GitHub (DevOps)

          Use the `gh` CLI to interact with GitHub. The `GH_TOKEN` is pre-configured with the DevOps bot identity.

          ## Common Commands
          ```bash
          gh run list --repo owner/repo --limit 10
          gh run view <run-id> --repo owner/repo
          gh run rerun <run-id> --failed --repo owner/repo
          gh release list --repo owner/repo
          gh release create v1.0.0 --title "..." --notes "..."
          gh workflow list --repo owner/repo
          ```
          Always specify `--repo owner/repo`. Use `--json` with `--jq` for structured output.

        openclaw.json: |
          {
            "gateway": {
              "port": 18789,
              "mode": "local",
              "trustedProxies": ["172.16.51.66"],
              "controlUi": {
                "allowedOrigins": ["https://openclaw.gregpakes.co.uk"]
              }
            },
            "browser": {
              "enabled": true,
              "defaultProfile": "default",
              "profiles": {
                "default": {
                  "cdpUrl": "http://localhost:9222",
                  "color": "#4285F4"
                }
              }
            },
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://172.16.10.133:11434",
                  "apiKey": "ollama-local",
                  "api": "ollama",
                  "models": [{ "id": "qwen3.5:35b-a3b", "name": "Qwen 3.5 35B A3b", "contextWindow": 32768 }]
                },
                "openrouter": {
                  "baseUrl": "https://openrouter.ai/api/v1",
                  "apiKey": "${OPENROUTER_API_KEY}",
                  "api": "openai-completions",
                  "models": [
                    { "id": "anthropic/claude-sonnet-4.6", "name": "Claude Sonnet 4.6", "contextWindow": 1000000 },
                    { "id": "minimax/minimax-m1",          "name": "MiniMax M1",         "contextWindow": 1000000 },
                    { "id": "deepseek/deepseek-chat",      "name": "DeepSeek V3",         "contextWindow": 65536   },
                    { "id": "openrouter/auto",             "name": "Auto Router",         "contextWindow": 200000  }
                  ]
                },
                "freerouter": {
                  "baseUrl": "http://127.0.0.1:18801/v1",
                  "api": "openai-completions",
                  "models": [
                    { "id": "freerouter/auto", "name": "FreeRouter Auto", "input": ["text"] }
                  ]
                }
              }
            },
            "plugins": {
              "entries": {
                "openclaw-freerouter": {
                  "config": {
                    "port": 18801,
                    "host": "127.0.0.1",
                    "defaultTier": "MEDIUM",
                    "tiers": {
                      "SIMPLE":    { "primary": "openrouter/minimax/minimax-m1",          "fallback": [] },
                      "MEDIUM":    { "primary": "openrouter/deepseek/deepseek-chat",       "fallback": ["openrouter/anthropic/claude-sonnet-4.6"] },
                      "COMPLEX":   { "primary": "openrouter/anthropic/claude-sonnet-4.6",  "fallback": [] },
                      "REASONING": { "primary": "openrouter/anthropic/claude-sonnet-4.6",  "fallback": [] }
                    }
                  }
                }
              }
            },
            "skills": {
              "entries": {
                "github-main":   { "enabled": true, "env": { "GH_TOKEN": "${GITHUB_TOKEN_MAIN}",   "PATH": "/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" } },
                "github-coder":  { "enabled": true, "env": { "GH_TOKEN": "${GITHUB_TOKEN_CODER}",  "PATH": "/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" } },
                "github-devops": { "enabled": true, "env": { "GH_TOKEN": "${GITHUB_TOKEN_DEVOPS}", "PATH": "/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" } }
              }
            },
            "agents": {
              "defaults": {
                "model": { "primary": "freerouter/freerouter/auto" },
                "userTimezone": "Europe/London",
                "timeoutSeconds": 600,
                "maxConcurrent": 3
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "workspace": "/home/node/.openclaw/workspace-main",
                  "identity": { "name": "Assistant", "emoji": "🤝" },
                  "model": { "primary": "ollama/qwen3.5:35b-a3b" }
                },
                {
                  "id": "coder",
                  "workspace": "/home/node/.openclaw/workspace-coder",
                  "identity": { "name": "Coder", "emoji": "💻" },
                  "model": { "primary": "openrouter/anthropic/claude-sonnet-4.6" }
                },
                {
                  "id": "devops",
                  "workspace": "/home/node/.openclaw/workspace-devops",
                  "identity": { "name": "DevOps", "emoji": "⚙️" },
                  "model": { "primary": "freerouter/freerouter/auto" }
                }
              ]
            },
            "bindings": [
              { "agentId": "main",   "match": { "channel": "slack", "accountId": "main" } },
              { "agentId": "coder",  "match": { "channel": "slack", "accountId": "coder" } },
              { "agentId": "devops", "match": { "channel": "slack", "accountId": "devops" } }
            ],
            "session": {
              "scope": "per-sender",
              "store": "/home/node/.openclaw/sessions",
              "reset": { "mode": "idle", "idleMinutes": 60 }
            },
            "logging": {
              "level": "info",
              "consoleLevel": "info",
              "consoleStyle": "compact",
              "redactSensitive": "tools"
            },
            "tools": {
              "profile": "full",
              "web": { "search": { "enabled": false }, "fetch": { "enabled": true } },
              "agentToAgent": {
                "enabled": true,
                "allow": ["main", "coder", "devops"]
              }
            },
            "channels": {
              "slack": {
                "groupPolicy": "open",
                "accounts": {
                  "main": {
                    "botToken": "${SLACK_BOT_TOKEN_MAIN}",
                    "appToken": "${SLACK_APP_TOKEN_MAIN}"
                  },
                  "coder": {
                    "botToken": "${SLACK_BOT_TOKEN_CODER}",
                    "appToken": "${SLACK_APP_TOKEN_CODER}"
                  },
                  "devops": {
                    "botToken": "${SLACK_BOT_TOKEN_DEVOPS}",
                    "appToken": "${SLACK_APP_TOKEN_DEVOPS}"
                  }
                }
              }
            }
          }

  persistence:
    config:
      advancedMounts:
        main:
          init-skills:
            - path: /config
              readOnly: true
          init-agents:
            - path: /config
              readOnly: true

    skills:
      type: configMap
      name: openclaw-skills
      advancedMounts:
        main:
          init-skills:
            - path: /skills
              readOnly: true

    data:
      advancedMounts:
        main:
          init-freerouter:
            - path: /home/node/.openclaw
          init-skills:
            - path: /home/node/.openclaw
          init-agents:
            - path: /home/node/.openclaw

    tmp:
      advancedMounts:
        main:
          init-freerouter:
            - path: /tmp
          init-skills:
            - path: /tmp
          init-agents:
            - path: /tmp

    shm:
      enabled: true
      type: emptyDir
      medium: Memory
      sizeLimit: 1Gi
      advancedMounts:
        main:
          chromium:
            - path: /dev/shm

  ingress:
    main:
      enabled: true
      className: traefik-internal
      hosts:
        - host: openclaw.gregpakes.co.uk
          paths:
            - path: /
              service:
                identifier: main
                port: http
