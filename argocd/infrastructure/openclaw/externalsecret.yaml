apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: homelab
  target:
    name: openclaw-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      type: Opaque
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: openai-api-key
        metadataPolicy: None
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: openrouter-api-key
        metadataPolicy: None
    - secretKey: OPENCLAW_GATEWAY_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: gateway-token
        metadataPolicy: None
    - secretKey: SLACK_BOT_TOKEN_MAIN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: slack-bot-token-main
        metadataPolicy: None
    - secretKey: SLACK_APP_TOKEN_MAIN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: slack-app-token-main
        metadataPolicy: None
    - secretKey: SLACK_BOT_TOKEN_CODER
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: slack-bot-token-coder
        metadataPolicy: None
    - secretKey: SLACK_APP_TOKEN_CODER
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: slack-app-token-coder
        metadataPolicy: None
    - secretKey: SLACK_BOT_TOKEN_DEVOPS
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: slack-bot-token-devops
        metadataPolicy: None
    - secretKey: SLACK_APP_TOKEN_DEVOPS
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: slack-app-token-devops
        metadataPolicy: None
    - secretKey: GITHUB_TOKEN_MAIN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: github-token-main
        metadataPolicy: None
    - secretKey: GITHUB_TOKEN_CODER
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: github-token-coder
        metadataPolicy: None
    - secretKey: GITHUB_TOKEN_DEVOPS
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: github-token-devops
        metadataPolicy: None
    - secretKey: MSTEAMS_APP_ID
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: msteams-app-id
        metadataPolicy: None
    - secretKey: MSTEAMS_APP_PASSWORD
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: msteams-app-password
        metadataPolicy: None
    - secretKey: MSTEAMS_TENANT_ID
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: openclaw
        property: msteams-tenant-id
        metadataPolicy: None
