apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skills
  namespace: openclaw
data:
  flaresolverr.SKILL.md: |
    ---
    name: flaresolverr
    description: Bypass Cloudflare and anti-bot protection when fetching web pages. Use when web_fetch or the browser tool fails due to Cloudflare challenges, CAPTCHA walls, or bot detection (403/503 errors, "Just a moment..." pages). Routes requests through FlareSolverr proxy at http://flaresolverr.servarr.svc.cluster.local:8191 to solve challenges and retrieve page content.
    metadata: {"openclaw": {"always": true}}
    ---

    # FlareSolverr

    FlareSolverr is a proxy server that solves Cloudflare and other anti-bot challenges, returning the page content and cookies once the challenge is solved.

    **Endpoint:** `http://flaresolverr.servarr.svc.cluster.local:8191`

    ## When to Use

    Use FlareSolverr when a URL returns:
    - Cloudflare "Just a moment..." challenge pages
    - HTTP 403 or 503 from Cloudflare
    - Bot detection / CAPTCHA blocks

    Normal `web_fetch` or `browser` calls should still be tried first. Fall back to FlareSolverr only when they fail due to anti-bot protection.

    ## Usage

    Send a POST request to `/v1`:

    ```bash
    curl -s -X POST http://flaresolverr.servarr.svc.cluster.local:8191/v1 \
      -H "Content-Type: application/json" \
      -d '{
        "cmd": "request.get",
        "url": "https://example.com",
        "maxTimeout": 60000
      }'
    ```

    ### Response

    ```json
    {
      "status": "ok",
      "solution": {
        "url": "https://example.com",
        "status": 200,
        "response": "<html>...</html>",
        "cookies": [],
        "userAgent": "..."
      }
    }
    ```

    Extract the page content from `solution.response`. Use `solution.cookies` and `solution.userAgent` if you need to make follow-up requests with the same session.

    ### Session-based requests (optional)

    For sites requiring persistent sessions across multiple requests:

    ```bash
    # Create a session
    curl -s -X POST http://flaresolverr.servarr.svc.cluster.local:8191/v1 \
      -H "Content-Type: application/json" \
      -d '{"cmd": "sessions.create", "session": "my-session"}'

    # Use the session
    curl -s -X POST http://flaresolverr.servarr.svc.cluster.local:8191/v1 \
      -H "Content-Type: application/json" \
      -d '{"cmd": "request.get", "url": "https://example.com", "session": "my-session", "maxTimeout": 60000}'

    # Destroy when done
    curl -s -X POST http://flaresolverr.servarr.svc.cluster.local:8191/v1 \
      -H "Content-Type: application/json" \
      -d '{"cmd": "sessions.destroy", "session": "my-session"}'
    ```

    ## Notes

    - `maxTimeout` is in milliseconds; 60000 (60s) is a safe default for most sites
    - FlareSolverr runs a real browser internally — responses may take 10–30 seconds
    - Only available within the cluster (`servarr` namespace)

  1password.SKILL.md: |
    ---
    name: 1password
    description: Retrieve secrets and credentials from the Homelab 1Password vault via the Connect API. Use when you need to look up API keys, passwords, tokens, or other credentials stored in 1Password to complete a task. Do NOT use this to display or output secret values — only ever use fetched secrets silently inside commands or written to files.
    metadata: {"openclaw": {"requires": {"env": ["OP_CONNECT_TOKEN"]}}}
    ---

    # 1Password

    Fetch secrets from 1Password Connect running in-cluster.

    **Endpoint:** `http://onepassword-connect.external-secrets.svc.cluster.local:8080`
    **Auth:** `Authorization: Bearer $OP_CONNECT_TOKEN` (pre-injected — do not print or echo this value)

    ## ⚠️ Secret Handling Rules

    - **NEVER output secret values** in chat responses, tool outputs, or logs
    - Capture fetched values into shell variables or temp files only
    - If asked to reveal a secret, decline and offer to use it silently instead
    - Reference secrets by name/label only when communicating with the user

    ## Usage

    ### List vaults

    ```bash
    curl -sf -H "Authorization: Bearer $OP_CONNECT_TOKEN" \
      http://onepassword-connect.external-secrets.svc.cluster.local:8080/v1/vaults \
      | jq -r '.[] | "\(.id)\t\(.name)"'
    ```

    The primary vault is named **`Homelab`**.

    ### List items in a vault

    ```bash
    curl -sf -H "Authorization: Bearer $OP_CONNECT_TOKEN" \
      "http://onepassword-connect.external-secrets.svc.cluster.local:8080/v1/vaults/{vaultId}/items" \
      | jq -r '.[] | "\(.id)\t\(.title)"'
    ```

    ### Search items by title

    ```bash
    curl -sf -H "Authorization: Bearer $OP_CONNECT_TOKEN" \
      "http://onepassword-connect.external-secrets.svc.cluster.local:8080/v1/vaults/{vaultId}/items?filter=title%3D%3D{title}" \
      | jq -r '.[] | "\(.id)\t\(.title)"'
    ```

    ### Fetch a specific field silently into a variable

    ```bash
    SECRET=$(curl -sf -H "Authorization: Bearer $OP_CONNECT_TOKEN" \
      "http://onepassword-connect.external-secrets.svc.cluster.local:8080/v1/vaults/{vaultId}/items/{itemId}" \
      | jq -r '.fields[] | select(.label == "{field-label}") | .value')

    # Use $SECRET in subsequent commands — never echo or print it
    ```

    ## Item Structure

    Fields live in `.fields[]`. Each field has:
    - `label` — human-readable name (e.g. `"password"`, `"username"`, `"api-key"`)
    - `value` — the secret value
    - `type` — `"CONCEALED"` for secrets, `"STRING"` for plain text

    To list all field labels for an item:

    ```bash
    curl -sf -H "Authorization: Bearer $OP_CONNECT_TOKEN" \
      "http://onepassword-connect.external-secrets.svc.cluster.local:8080/v1/vaults/{vaultId}/items/{itemId}" \
      | jq -r '.fields[] | "\(.label) (\(.type))"'
    ```
