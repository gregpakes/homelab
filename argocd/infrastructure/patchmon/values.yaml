global:
  storageClass: longhorn

fullnameOverride: patchmon

database:
  image:
    tag: "17-alpine"
  auth:
    existingSecret: patchmon-secrets
    existingSecretPasswordKey: postgres-password
  persistence:
    size: 5Gi

redis:
  image:
    tag: "7-alpine"
  auth:
    existingSecret: patchmon-secrets
    existingSecretPasswordKey: redis-password
  persistence:
    size: 2Gi

server:
  image:
    tag: "2.0.2"
  env:
    serverProtocol: https
    serverHost: patchmon.gregpakes.co.uk
    serverPort: "443"
    corsOrigin: https://patchmon.gregpakes.co.uk
    trustProxy: "true"
    enableHsts: true
    enableLogging: true
    logLevel: info
    logToConsole: true
  existingSecret: patchmon-secrets
  existingSecretJwtKey: jwt-secret
  existingSecretAiEncryptionKey: ai-encryption-key
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 1Gi
  extraEnv:
    - name: TZ
      value: Europe/London

guacd:
  enabled: true
  image:
    tag: "1.5.5"

ingress:
  enabled: true
  className: traefik-internal
  annotations: null
  hosts:
    - host: patchmon.gregpakes.co.uk
      paths:
        - path: /
          pathType: Prefix
          service:
            name: server
            port: 3000

secret:
  create: false
