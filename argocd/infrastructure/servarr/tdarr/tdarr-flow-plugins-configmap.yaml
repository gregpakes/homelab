apiVersion: v1
kind: ConfigMap
metadata:
  name: tdarr-flow-plugins
  namespace: servarr
data:
  hasNonEnglishTracks.js: |
    "use strict";
    Object.defineProperty(exports, "__esModule", { value: true });
    exports.plugin = exports.details = void 0;

    var details = function () { return ({
      name: 'Has Non-English Tracks',
      description: 'Output 1 if non-English audio/sub tracks exist, output 2 if already clean.',
      style: {
        borderColor: 'orange',
      },
      tags: '',
      isStartPlugin: false,
      pType: '',
      requiresVersion: '2.11.01',
      sidebarPosition: -1,
      icon: 'faFilter',
      inputs: [],
      outputs: [
        { number: 1, tooltip: 'Has non-English tracks - process' },
        { number: 2, tooltip: 'Already clean - skip' },
      ],
    }); };
    exports.details = details;

    var plugin = function (args) {
      var lib = require('../../../../../methods/lib')();
      args.inputs = lib.loadDefaultValues(args.inputs, details);

      var streams = (args.inputFileObj
        && args.inputFileObj.ffProbeData
        && args.inputFileObj.ffProbeData.streams) || [];

      var hasNonEnglish = streams.some(function (stream) {
        if (stream.codec_type !== 'audio' && stream.codec_type !== 'subtitle') return false;
        var lang = ((stream.tags && stream.tags.language) || 'und').toLowerCase();
        return lang !== 'eng' && lang !== 'und';
      });

      return {
        outputFileObj: args.inputFileObj,
        outputNumber: hasNonEnglish ? 1 : 2,
        variables: args.variables,
      };
    };
    exports.plugin = plugin;